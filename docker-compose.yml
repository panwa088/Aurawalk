version: "3.9"

services:

  postgres:
    image: postgis/postgis:16-3.4
    restart: always

    environment:
      POSTGRES_USER: aurawalk
      POSTGRES_PASSWORD: aurawalk
      POSTGRES_DB: aurawalk

    ports:
      - "5432:5432"

  redis:

    image: redis:7

    ports:
      - "6379:6379"

  backend:

    build: ./backend

    ports:
      - "8000:8000"

    depends_on:

      - postgres

      - redis

  frontend:

    build: ./frontend

    ports:
      - "5173:5173"

    depends_on:

      - backend